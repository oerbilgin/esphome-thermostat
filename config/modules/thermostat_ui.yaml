json:

substitutions:
  thermostat_x_pos: 390
  thermostat_y_pos: 10
  thermostat_arc_x_pos: 0
  thermostat_arc_y_pos: 10
  thermostat_arc_width: 48
  thermostat_setpoint_knob_size: 8
  thermostat_actual_knob_size: -4
  thermostat_arc_min_value: 55
  thermostat_arc_max_value: 90
  initial_setpoint_value: 72

globals:
  - id: setpoint_updating
    type: bool
    initial_value: 'false'
  - id: thermostat_arc_max_value_global
    type: int
    initial_value: '90' # cant substitute this for some reason, make sure it matches
  - id: thermostat_arc_min_value_global
    type: int
    initial_value: '55' # cant substitute this for some reason, make sure it matches

script:
- id: update_wind_color
  mode: restart # Restarts the script if called again quickly
  then:
    - lambda: |-
        float s = std::isnan(id(wind_speed_today).state) ? 0.0f : id(wind_speed_today).state;
        float g = std::isnan(id(wind_gust_today).state) ? 0.0f : id(wind_gust_today).state;
        float max_wind = std::max(s, g);

        lv_color_t text_color = get_wind_text_color(max_wind);
        lv_color_t bg_color = get_wind_bg_color(max_wind);
        lv_color_t label_color;

        if (max_wind > 54) {
          label_color = my_colors::text_light_gray;
        } else {
          label_color = my_colors::text_dark_gray;
        }

        lv_obj_set_style_bg_color(id(wind_condition_chip), bg_color, LV_PART_MAIN);
        lv_obj_set_style_text_color(id(wind_speed_label), text_color, LV_PART_MAIN);
        lv_obj_set_style_text_color(id(wind_speed_unit), text_color, LV_PART_MAIN);
        lv_obj_set_style_text_color(id(wind_gust_label), text_color, LV_PART_MAIN);
        
        lv_obj_set_style_text_color(id(wind_condtion_chip_label), label_color, LV_PART_MAIN);

        // Force immediate redraw 
        lv_obj_invalidate(id(wind_condition_chip));


number:
  - platform: template
    id: setpoint_value
    name: "Setpoint Value"
    min_value: $thermostat_arc_min_value
    max_value: $thermostat_arc_max_value
    step: 1
    optimistic: true
    initial_value: $initial_setpoint_value
    restore_value: true
    set_action:
      - globals.set:
          id: setpoint_updating
          value: 'true'
      - lvgl.arc.update:
          id: setpoint_arc
          value: !lambda 'return x;'
      - lvgl.label.update:
          id: setpoint_number
          text: !lambda 'return to_string((int)x) + "°F";'
      - globals.set:
          id: setpoint_updating
          value: 'false'

sensor:
  # AQI
  - platform: homeassistant
    id: aqi_sensor
    entity_id: sensor.airnow_air_quality_index
    internal: true
    on_raw_value:
      then:
        - if:
            condition:
              lambda: 'return id(aqi_sensor).has_state();'
            then:
              - lvgl.label.update:
                  id: aqi_number
                  text: !lambda 'return to_string((int)x);'
                  text_color: !lambda 'return get_aqi_text_color((float)x);'
              - lvgl.widget.update:
                  id: aqi_chip
                  bg_color: !lambda 'return get_aqi_bg_color((float)x);'
                  shadow_color: !lambda 'return get_aqi_bg_color((float)x);'
              - if:
                  condition:
                    lambda: 'return x >= 300;'
                  then:
                    - lvgl.label.update:
                        id: aqi_number
                        text_color: !lambda 'return my_colors::text_light_gray;'
                  else:
                    - lvgl.label.update:
                        id: aqi_number
                        text_color: !lambda 'return my_colors::text_dark_gray;'
            else:
              - lvgl.label.update:
                  id: aqi_number
                  text: "err"
                  text_color: chip_label_color_dark
              - lvgl.widget.update:
                  id: aqi_chip
                  bg_color: chip_label_color_light
                  shadow_color: chip_label_color_light

  
  # Inside house temp
  # TODO: make logic for which inside temp to use based on availability, or do this directly in HASS
  - platform: homeassistant
    id: average_house_temperature
    entity_id: sensor.average_house_temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: current_temp_number
            text: !lambda 'return to_string((int)x) + "°F";'
        - lvgl.arc.update:
            id: 
              - heat_arc_actual_temp
              - auto_heat_arc_actual_temp
              - auto_cool_arc_actual_temp
            value: !lambda 'return (int)x;'
        - lvgl.arc.update:
            id: 
              - cool_arc_actual_temp
              - auto_cool_arc_actual_temp
            value: !lambda |-
              int min_val = (int)id(thermostat_arc_min_value_global);
              int max_val = (int)id(thermostat_arc_max_value_global);
              int actual_temp = (int)x;
              int result = max_val - actual_temp + min_val;
              ESP_LOGI("Thermostat", "Updating actual temp arcs: min_val=%d, actual_temp=%d, result=%d", min_val, actual_temp, result);
              return result;
  
  # next rain probability
  - platform: homeassistant
    id: next_rain_probability
    entity_id: sensor.next_rain_forecast
    attribute: precipitation_probability
    internal: true
    on_value: 
      then:
        lvgl.label.update:
          id: next_rain_probability_label
          text: !lambda 'return to_string((int)x) + "%";'

  # wind speed forecast
  - platform: homeassistant
    id: wind_speed_today
    entity_id: sensor.nws_now_forecast
    internal: true
    attribute: wind_speed
    on_value:
      then:
        - lvgl.label.update:
            id: wind_speed_label
            text: !lambda 'return to_string((int)x);'
        - script.execute: update_wind_color


  # wind bearing forecast
  # TODO: hook this up to something
  - platform: homeassistant
    id: wind_bearing_today
    entity_id: sensor.nws_now_forecast
    internal: true
    attribute: wind_bearing
    # on_value: # TODO update wind chip TODO replace condition chip with wind chip

  # wind gust forecast
  - platform: homeassistant
    id: wind_gust_today
    entity_id: sensor.nws_now_forecast
    internal: true
    attribute: wind_gust
    on_value:
      then:
        - lvgl.label.update:
            id: wind_gust_label
            text: !lambda 'return "Gust " + to_string((int)x);'
        - script.execute: update_wind_color
  
  # todays high or low
  # TODO: guard against unavailable
  - platform: homeassistant
    id: temperature_today
    entity_id: sensor.nws_now_forecast
    internal: true
    attribute: temperature
    on_value:
      if:
        condition:
          lambda: 'return id(forecast_is_daytime).state;'
        then:
          - lvgl.label.update:
              id: days_high_number
              text: !lambda 'return to_string((int)x) + "°F";'
              text_color: !lambda 'return get_temp_text_color((float)x);'
          - lvgl.label.update:
              id: days_high_label
              text: "\uF077 High"
          - lvgl.widget.update:
              id: days_high_chip
              bg_color: !lambda 'return get_temp_bg_color((float)x);'
              shadow_color: !lambda 'return get_temp_bg_color((float)x);'
        else:
          - lvgl.label.update:
              id: days_low_number
              text: !lambda 'return to_string((int)x) + "°F";'
              text_color: !lambda 'return get_temp_text_color((float)x);'
          - lvgl.widget.update:
              id: days_low_chip
              bg_color: !lambda 'return get_temp_bg_color((float)x);'
              shadow_color: !lambda 'return get_temp_bg_color((float)x);'
  
  # todays low or tomorrows high
  # TODO: guard against unavailable
  - platform: homeassistant
    id: temperature_next
    entity_id: sensor.nws_next_forecast
    internal: true
    attribute: temperature
    on_value:
      if:
        condition:
          lambda: 'return id(forecast_is_daytime).state;'
        then:
          - lvgl.label.update:
              id: days_low_number
              text: !lambda 'return to_string((int)x) + "°F";'
              text_color: !lambda 'return get_temp_text_color((float)x);'
          - lvgl.widget.update:
              id: days_low_chip
              bg_color: !lambda 'return get_temp_bg_color((float)x);'
              shadow_color: !lambda 'return get_temp_bg_color((float)x);'
              
        else:
          - lvgl.label.update:
              id: days_high_number
              text: !lambda 'return to_string((int)x) + "°F";'
              text_color: !lambda 'return get_temp_text_color((float)x);'
          - lvgl.label.update: # TODO: maybe use a symbol?
              id: days_high_label
              text: "\uF077 High \uF054"
          - lvgl.widget.update:
              id: days_high_chip
              bg_color: !lambda 'return get_temp_bg_color((float)x);'
              shadow_color: !lambda 'return get_temp_bg_color((float)x);'
  
  # outside temp
  - platform: homeassistant
    id: outside_temp_sensor
    entity_id: sensor.average_outside_temperature
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: outside_temp_number
            text: !lambda 'return to_string((int)x) + "°F";'
            text_color: !lambda 'return get_temp_text_color((float)x);'
        - lvgl.widget.update:
            id: outside_temp_chip
            bg_color: !lambda 'return get_temp_bg_color((float)x);'
            shadow_color: !lambda 'return get_temp_bg_color((float)x);'
    
binary_sensor:
  # use to order the temp chips
  - platform: homeassistant
    id: forecast_is_daytime
    entity_id: sensor.nws_now_forecast
    internal: true
    attribute: is_daytime

text_sensor:
  # next rain day
  - platform: homeassistant
    id: next_rain_day_sensor
    entity_id: sensor.next_rain_forecast
    internal: true
    on_raw_value: 
      then:
        if:
          condition:
            lambda: 'return id(next_rain_day_sensor).has_state();'
          then:
            if:
              condition:
                lambda: 'return x == "No Rain Forecasted";'
              then:
                - lvgl.label.update:
                    id: next_rain_day
                    text: "Dry"
                    text_color: !lambda 'return my_colors::text_yellow;'
                - lvgl.widget.update:
                    id: next_rain_chip
                    bg_color: !lambda 'return my_colors::bg_yellow;'
              else:
                - lvgl.label.update:
                    id: next_rain_day
                    text: !lambda 'return x.substr(0, 3);'
                    text_color: !lambda 'return my_colors::text_dark_blue;'
                - lvgl.widget.update:
                    id: next_rain_chip
                    bg_color: !lambda 'return my_colors::bg_dark_blue;'
          else:
            - lvgl.label.update:
                id: next_rain_day
                text: "err"
                text_color: !lambda 'return my_colors::text_dark_gray;'
            - lvgl.widget.update:
                id: next_rain_chip
                bg_color: !lambda 'return my_colors::text_light_gray;'
  
  # weather conditions
  - platform: homeassistant
    id: conditions_today
    entity_id: sensor.nws_now_forecast
    internal: true
    attribute: condition_icon_token
    on_raw_value:
      then:
        if:
          condition:
            lambda: 'return id(conditions_today).has_state();'
          then:
            lvgl.label.update:
              id: days_condition_icon
              # FIXME: forecast_is_daytime not evaluating correctly
              text: !lambda |-
                if (x.find("wind") != std::string::npos) {
                  return "\U000F059D";
                } else if (x == "skc") {
                  if (id(forecast_is_daytime).state) {
                    return "\U000F0599";
                  } else {
                    return "\U000F0594";
                  }
                } else if (x == "few") {
                  if (id(forecast_is_daytime).state) {
                    return "\U000F0599";
                  } else {
                    return "\U000F0594";
                  }
                } else if (x == "sct") {
                    return "\U000F0595";
                } else if (x == "bkn") {
                    return "\U000F0590";
                } else if (x == "ovc") {
                    return "\U000F0590";
                } else if (x == "rain") {
                    return "\U000F0597";
                } else if (x == "rain_showers") {
                    return "\U000F0597";
                } else if (x == "tsra") {
                    return "\U000F0593";
                } else if (x == "snow") {
                    return "\U000F0598";
                } else if (x == "fzra") {
                    return "\U000F0598";
                } else if (x == "sleet") {
                    return "\U000F0598";
                } else if (x == "rain_sleet") {
                    return "\U000F0598";
                } else if (x == "snow_sleet") {
                    return "\U000F0598";
                } else if (x == "fog") {
                    return "\U000F0591";
                } else if (x == "haze") {
                    return "\U000F0591";
                } else if (x == "smoke") {
                    return "\U000F0591";
                } else if (x == "blizzard") {
                    return "\U000F0598";
                } else { 
                  return "\U000F02D7";
                };
          else:
            lvgl.label.update:
              id: days_condition_icon
              text: "err"
              text_font: montserrat_48


