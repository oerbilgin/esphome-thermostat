
substitutions:
  thermostat_x_pos: 390
  thermostat_y_pos: 10
  thermostat_arc_x_pos: 0
  thermostat_arc_y_pos: 10
  thermostat_arc_width: 48
  thermostat_setpoint_knob_size: 8
  thermostat_actual_knob_size: -4
  thermostat_arc_min_value: 32
  thermostat_arc_max_value: 100
  initial_setpoint_value: 72

globals:
  - id: setpoint_updating
    type: bool
    initial_value: 'false'
  - id: thermostat_arc_min_value_global
    type: int
    initial_value: '32' # cant substitute this for some reason, make sure it matches


number:
  - platform: template
    id: setpoint_value
    name: "Setpoint Value"
    min_value: $thermostat_arc_min_value
    max_value: $thermostat_arc_max_value
    step: 1
    optimistic: true
    initial_value: $initial_setpoint_value
    restore_value: true
    set_action:
      - globals.set:
          id: setpoint_updating
          value: 'true'
      - lvgl.arc.update:
          id: setpoint_arc
          value: !lambda 'return x;'
      - lvgl.label.update:
          id: setpoint_number
          text: !lambda 'return to_string((int)x) + "°F";'
      - globals.set:
          id: setpoint_updating
          value: 'false'

# External icon fonts - auto-generated for icons used in this design
# ESPHome downloads fonts automatically on first compile
font:
  - file:
      url: "https://cdn.jsdelivr.net/npm/@mdi/font@latest/fonts/materialdesignicons-webfont.ttf"
      type: web
    id: mdi_icons_34
    size: 34
    glyphs: [
      "\U000F0210",  # Fan
    ]
  - file:
      url: "https://cdn.jsdelivr.net/npm/@mdi/font@latest/fonts/materialdesignicons-webfont.ttf"
      type: web
    id: mdi_icons_48
    size: 48
    glyphs: [
      "\U000F0717",  # Snowflake
      "\U000F0238",  # Fire
      "\U000F0210",  # Fan
      "\U000F0393",  # Thermostat
      "\U000F059D",  # Windy
      "\U000F0595",  # Partly Cloudy
    ]

