# https://community.home-assistant.io/t/esp32-s3-4-3inch-capacitive-touch-display-from-waveshare/658279/78

packages:
  hardware_config: !include hardware_config.yaml

esphome:
  name: hvac-thermostat
  friendly_name: HVAC Thermostat

logger:
  level: DEBUG
time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Los_Angeles" # Change to your timezone
    on_time:
      - seconds: /60
        then:
          # Only update if time is valid
          - if:
              condition:
                lambda: 'return id(sntp_time).now().is_valid();'
              then:
                # 1. Update the Date Label
                - lvgl.label.update:
                    id: todays_date
                    text: !lambda |-
                      return id(sntp_time).now().strftime("%A, %B %d %Y");

                # 2. Update the Time Label (uses %l to drop the leading zero, e.g., "4:20 PM")
                - lvgl.label.update:
                    id: todays_time
                    text: !lambda |-
                      return id(sntp_time).now().strftime("%l:%M %p");

# External icon fonts - auto-generated for icons used in this design
# ESPHome downloads fonts automatically on first compile
font:
  - file:
      url: "https://cdn.jsdelivr.net/npm/@mdi/font@latest/fonts/materialdesignicons-webfont.ttf"
      type: web
    id: mdi_icons_34
    size: 34
    glyphs: [
      "\U000F0210",  # Fan
    ]
  - file:
      url: "https://cdn.jsdelivr.net/npm/@mdi/font@latest/fonts/materialdesignicons-webfont.ttf"
      type: web
    id: mdi_icons_48
    size: 48
    glyphs: [
      "\U000F0717",  # Snowflake
      "\U000F0238",  # Fire
      "\U000F0210",  # Fan
      "\U000F0393",  # Thermostat
      "\U000F059D",  # Windy
      "\U000F0595",  # Partly Cloudy
    ]

