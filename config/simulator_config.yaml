esphome:
  name: hvac-thermostat-sim
  friendly_name: Simulated HVAC Thermostat

logger:
  level: DEBUG

packages:
  main: !include modules/thermostat_ui.yaml
  time_config: !include modules/time_host.yaml

host:

# network and api sections so simulator can talk to hass
network:
  enable_ipv6: false

api:
  encryption:
    key: !secret encryption_key

display:
  - platform: sdl
    id: my_display
    dimensions:
      width: 800
      height: 480

touchscreen:
  - platform: sdl
    id: my_touch
    display: my_display